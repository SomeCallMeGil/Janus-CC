# Janus Configuration Example

# Deployment mode: standalone (single machine) or distributed (multi-machine)
mode: standalone

# HTTP Server configuration
server:
  host: 0.0.0.0
  port: 8080
  grpc_port: 9090  # For future agent support
  read_timeout: 30s
  write_timeout: 30s
  tls:
    enabled: false
    cert_file: /path/to/cert.pem
    key_file: /path/to/key.pem

# Database configuration
database:
  # For standalone mode (single machine)
  type: sqlite
  path: ./janus.db
  
  # For distributed mode (multiple machines)
  # Uncomment and configure for production:
  # type: postgres
  # host: localhost
  # port: 5432
  # name: janus
  # user: janus
  # password: secure_password
  # ssl_mode: require
  # max_open_conns: 25
  # max_idle_conns: 5

# Job queue configuration
queue:
  # For standalone mode
  type: memory
  
  # For distributed mode
  # Uncomment for production:
  # type: redis
  # host: localhost
  # port: 6379
  # password: ""
  # db: 0

# Storage configuration
storage:
  # For local storage
  type: local
  path: ./data
  
  # For cloud storage (S3)
  # Uncomment for cloud deployments:
  # type: s3
  # bucket: janus-payloads
  # region: us-east-1
  # access_key: YOUR_ACCESS_KEY
  # secret_key: YOUR_SECRET_KEY

# Agent configuration (for distributed mode)
agent:
  enabled: false
  server_url: localhost:9090
  id: agent-1
  heartbeat_interval: 30s
  work_dir: ./payloads
  max_concurrent: 5

# Logging configuration
logging:
  level: info  # debug, info, warn, error
  format: text # text or json
  output_path: stdout

# Environment Variable Examples:
# All config values can be overridden with environment variables:
#
# JANUS_MODE=standalone
# JANUS_SERVER_PORT=8080
# JANUS_DATABASE_TYPE=sqlite
# JANUS_DATABASE_PATH=./janus.db
# JANUS_LOGGING_LEVEL=debug
